apiVersion: nais.io/v1alpha1
kind: Application

metadata:
  labels:
    team: holmes
  name: watson-sak-demo
  namespace: holmes

spec:
  liveness:
    path: /api/health
    initialDelay: 5
    periodSeconds: 60
  readiness:
    path: /api/health
    initialDelay: 5
    periodSeconds: 5
  observability:
    logging:
      destinations:
        - id: loki
  accessPolicy:
    outbound:
      external:
        - host: holmes-unleash-api.nav.cloud.nais.io
  ingresses:
    - https://watson-sak-demo.ekstern.dev.nav.no
  replicas:
    min: 1
    max: 1
  image: {{image}}
  port: 3000
  azure:
    application:
      enabled: true
      tenant: trygdeetaten.no
      allowAllUsers: false
      claims:
        groups:
          - id: 962b04a8-40d7-4995-b035-63b2f8e0a46b
    sidecar:
      enabled: true
      autoLogin: true
      autoLoginIgnorePaths:
        - /api/health
        - /assets/logos/*

  envFrom:
    - secret: watson-sak
    - secret: watson-sak-unleash-api-token
  env:
    - name: CLUSTER
      value: dev-gcp
    - name: FARO_URL
      value: https://telemetry.ekstern.dev.nav.no/collect
    - name: UMAMI_SITE_ID
      value: 2a620987-f8b6-43ee-aaed-2845f515b8a1
    - name: ENVIRONMENT
      value: demo
    - name: APP_VERSION
      value: {{APP_VERSION}}
